[tool.black]
line-length = 80
skip-string-normalization = true
skip-magic-trailing-comma = true

[tool.isort]
profile = "black"
known_first_party = "octodns_route53"
known_octodns = "octodns"
line_length = 80
sections = "FUTURE,STDLIB,THIRDPARTY,OCTODNS,FIRSTPARTY,LOCALFOLDER"

[tool.pytest.ini_options]
filterwarnings = [
  'error',
  # required until migrate the check and require octoDNS >= 2.x
  'ignore:`_Route53AliasValue.validate` classmethod is DEPRECATED:DeprecationWarning:octodns.record.base',
]
pythonpath = "."
